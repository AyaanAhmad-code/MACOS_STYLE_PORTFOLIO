<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Face shape -->
  <rect x="8" y="8" width="48" height="48" rx="12" fill="none"/>
  <!-- Left half - blue face -->
  <clipPath id="left-clip">
    <rect x="8" y="8" width="24" height="48"/>
  </clipPath>
  <rect x="8" y="8" width="48" height="48" rx="12" fill="#5AC8FA" clip-path="url(#left-clip)"/>
  <!-- Right half - dark face -->
  <clipPath id="right-clip">
    <rect x="32" y="8" width="24" height="48"/>
  </clipPath>
  <rect x="8" y="8" width="48" height="48" rx="12" fill="#1C1C1E" clip-path="url(#right-clip)"/>
  <!-- Left eye white -->
  <ellipse cx="24" cy="28" rx="7" ry="8" fill="white"/>
  <!-- Right eye white -->
  <ellipse cx="40" cy="28" rx="7" ry="8" fill="white"/>
  <!-- Left pupil -->
  <ellipse cx="25" cy="30" rx="3.5" ry="4" fill="#1C3A78"/>
  <!-- Right pupil -->
  <ellipse cx="41" cy="30" rx="3.5" ry="4" fill="#1C3A78"/>
  <!-- Smile -->
  <path d="M22 43 Q32 52 42 43" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
</svg>
